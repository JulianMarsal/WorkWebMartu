<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>404 — Martina Parola</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='5' fill='%230a0a0a'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='20' fill='%23ffffff' text-anchor='middle' font-style='italic'%3EM%3C/text%3E%3Ccircle cx='24' cy='23' r='2.2' fill='%23b8352e'/%3E%3C/svg%3E">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.6;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(184, 53, 46, 0.08), transparent 60%),
        radial-gradient(ellipse 50% 40% at 70% 80%, rgba(184, 53, 46, 0.05), transparent 60%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.045;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      mix-blend-mode: overlay;
    }
    .container {
      text-align: center;
      position: relative;
      z-index: 1;
      max-width: 480px;
    }
    .code {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(6rem, 18vw, 10rem);
      line-height: 1;
      letter-spacing: 0.02em;
      color: #b8352e;
      margin-bottom: 1rem;
    }
    h1 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-bottom: 1rem;
    }
    p {
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 2.5rem;
      font-size: 1rem;
    }
    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1.75rem;
      border: 1px solid #b8352e;
      color: #b8352e;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      transition: background 0.3s, color 0.3s;
    }
    .home-link:hover {
      background: #b8352e;
      color: white;
    }
    .lang { margin-top: 2rem; font-size: 0.85rem; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscás no existe o fue movida.</p>
    <a href="/" class="home-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="m12 19-7-7 7-7"></path></svg>
      Volver al inicio
    </a>
    <div class="lang">Page not found · <a href="/" style="color:#b8352e;text-decoration:none;">Go home</a></div>
  </div>
</body>
</html>
